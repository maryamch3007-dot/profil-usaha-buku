<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Testimoni | Toko Buku Maryam dan Savryna</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background: linear-gradient(135deg, #f3e5d8, #e6ccb2);
    color:#4e342e;
}

/* ===== NAVBAR FLOATING MODERN ===== */
nav{
    position:sticky;
    top:20px;
    display:flex;
    justify-content:center;
    z-index:1000;
    margin-top:20px;
}

nav ul{
    list-style:none;
    display:flex;
    gap:25px;
    background:rgba(62,39,35,0.95);
    padding:14px 35px;
    border-radius:50px;
    box-shadow:0 12px 30px rgba(0,0,0,0.18);
    backdrop-filter:blur(10px);
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:500;
    font-size:14px;
    letter-spacing:0.5px;
    padding:8px 14px;
    border-radius:20px;
    transition:0.3s ease;
}

nav ul li a:hover{
    background:#ffcc80;
    color:#3e2723;
}

/* ===== JUDUL ===== */
h1{
    text-align:center;
    margin:60px 0 10px 0;
    font-size:30px;
    font-weight:700;
}

h2{
    text-align:center;
    margin-bottom:20px;
    font-weight:500;
}

/* ===== FORM CARD ===== */
.formulir{
    width:90%;
    max-width:600px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:25px;
    box-shadow:0 15px 30px rgba(0,0,0,0.08);
    transition:0.3s;
}

.formulir:hover{
    transform:translateY(-5px);
}

/* ===== INPUT ===== */
label{
    display:block;
    margin-top:15px;
    font-weight:500;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:12px;
    border:1px solid #d7ccc8;
    font-family:'Poppins', sans-serif;
    transition:0.3s;
}

input:focus, textarea:focus{
    outline:none;
    border:1px solid #6d4c41;
    box-shadow:0 0 8px rgba(109,76,65,0.3);
}

textarea{
    resize:none;
}

/* ===== BUTTON ===== */
button{
    margin-top:20px;
    width:100%;
    padding:12px;
    background: linear-gradient(45deg, #6d4c41, #4e342e);
    color:white;
    border:none;
    border-radius:15px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background: linear-gradient(45deg, #3e2723, #5d4037);
    transform:scale(1.03);
}

/* ===== FOOTER ===== */
footer{
    background:#3e2723;
    color:white;
    text-align:center;
    padding:18px;
    margin-top:40px;
}
</style>
</head>

<body>

<nav>
    <ul>
        <li><a href="index.html">Beranda</a></li>
        <li><a href="produk.html">Produk</a></li>
        <li><a href="bedah-buku.html">Bedah Buku</a></li>
        <li><a href="testimoni.html">Testimoni</a></li>
        <li><a href="tampil-testimoni.html">Testimoni Pembeli</a></li>
        <li><a href="kontak.html">Kontak</a></li>
        <li><a href="event.html">Event</a></li>
    </ul>
</nav>

<h1>Toko Buku Maryam dan Savryna</h1>

<main class="formulir">
<h2>Berikan Testimoni Anda 🤎</h2>

<form id="formTestimoni">

<label for="nama">Nama:</label>
<input type="text" id="nama" name="nama" required placeholder="Nama Lengkap">

<label for="asal">Asal Sekolah/Instansi/Komunitas:</label>
<input type="text" id="asal" name="asal" required placeholder="Contoh: SMA Al-Kautsar">

<label for="email">Email:</label>
<input type="email" id="email" name="email" required placeholder="email@example.com">

<label for="judul">Judul Buku yang dibeli:</label>
<input type="text" id="judul" name="judul">

<label for="rating">Rating Buku (1-5):</label>
<input type="number" id="rating" name="rating" min="1" max="5">

<label for="pesan">Testimoni Anda:</label>
<textarea id="pesan" name="pesan" required placeholder="Tulis pengalaman Anda..." rows="5"></textarea>

<button type="submit">Kirim Testimoni ✨</button>

</form>
</main>

<footer>
<p>&copy; 2026 Toko Buku Maryam dan Savryna</p>
</footer>

<script>
document.getElementById('formTestimoni').addEventListener('submit', function(e){
    e.preventDefault();

    const nama = document.getElementById('nama').value;
    const asal = document.getElementById('asal').value;
    const email = document.getElementById('email').value;
    const judul = document.getElementById('judul').value;
    const rating = document.getElementById('rating').value;
    const pesan = document.getElementById('pesan').value;

    const dataBaru = { nama, asal, email, judul, rating, pesan };

    const testimoniList = JSON.parse(localStorage.getItem('testimoniList')) || [];
    testimoniList.push(dataBaru);
    localStorage.setItem('testimoniList', JSON.stringify(testimoniList));

    window.location.href = 'proses-testimoni.html';
});
</script>

</body>
</html>
